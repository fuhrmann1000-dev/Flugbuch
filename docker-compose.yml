services:
  # ─────────────────────────────────────────────
  #  Datenbank
  # ─────────────────────────────────────────────
  flugbuch-db:
    image: mysql:8.0
    container_name: flugbuch_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: flugbuch
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: flugbuch_user
      MYSQL_PASSWORD: flugbuch_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uflugbuch_user",
          "-pflugbuch_password",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  # ─────────────────────────────────────────────
  #  phpMyAdmin
  # ─────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5
    container_name: flugbuch_phpmyadmin
    restart: unless-stopped
    depends_on:
      flugbuch-db:
        condition: service_healthy
    environment:
      PMA_HOST: flugbuch-db
      PMA_PORT: 3306
      PMA_USER: flugbuch_user
      PMA_PASSWORD: flugbuch_password
      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"
    networks:
      - backend

  # ─────────────────────────────────────────────
  #  Backend (Spring Boot)
  # ─────────────────────────────────────────────
  flugbuch-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flugbuch_backend
    restart: unless-stopped
    depends_on:
      flugbuch-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://flugbuch-db:3306/flugbuch?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: flugbuch_user
      SPRING_DATASOURCE_PASSWORD: flugbuch_password
      SPRING_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    volumes:
      - ./backend/import-daten:/app/import
    ports:
      - "8080:8080"
    networks:
      - backend
      - frontend

  # ─────────────────────────────────────────────
  #  Frontend (Angular) – erst aktiv mit Profil
  # ─────────────────────────────────────────────
  flugbuch-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flugbuch_frontend
    restart: unless-stopped
    depends_on:
      - flugbuch-backend
    ports:
      - "4200:80"
    networks:
      - frontend
    profiles:
      - frontend

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  db_data:
    driver: local
