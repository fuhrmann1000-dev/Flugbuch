<div class="ml-shell" [class.ml-collapsed]="collapsed()" [class.ml-mobile-open]="mobileOpen()">

    <!-- ── Mobile Overlay ──────────────────────────────────── -->
    <div class="ml-overlay" (click)="closeMobile()"></div>

    <!-- ══════════════════════════════════════════════════════
       SIDEBAR
  ══════════════════════════════════════════════════════════ -->
    <aside class="ml-sidebar">

        <!-- Logo -->
        <div class="ml-logo">
            <div class="ml-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Stylized plane/compass icon -->
                    <path d="M12 2L3 7l9 5 9-5-9-5z" fill="currentColor" opacity="0.9" />
                    <path d="M3 12l9 5 9-5" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.6" />
                    <path d="M3 17l9 5 9-5" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.3" />
                </svg>
            </div>
            <div class="ml-logo-text">
                <span class="ml-logo-top">AERO</span>
                <span class="ml-logo-bottom">LOGBOOK</span>
            </div>
        </div>

        <!-- Collapse Toggle -->
        <button class="ml-collapse-btn" (click)="toggleSidebar()" [title]="collapsed() ? 'Expand' : 'Collapse'">
            <svg viewBox="0 0 16 16" fill="currentColor">
                <path *ngIf="!collapsed()" d="M11 8L6 3.5v9L11 8z" />
                <path *ngIf="collapsed()" d="M5 8l5 4.5V3.5L5 8z" />
            </svg>
        </button>

        <!-- Nav -->
        <nav class="ml-nav">
            <ul class="ml-nav-list">
                @for (item of navItems; track item.route) {
                <li>
                    <a class="ml-nav-item" [routerLink]="item.route" routerLinkActive="active" (click)="closeMobile()"
                        [title]="collapsed() ? item.label : ''">
                        <span class="ml-nav-icon">
                            <ng-container [ngSwitch]="item.icon">

                                <!-- grid -->
                                <svg *ngSwitchCase="'grid'" viewBox="0 0 20 20" fill="currentColor">
                                    <rect x="2" y="2" width="7" height="7" rx="1.5" />
                                    <rect x="11" y="2" width="7" height="7" rx="1.5" />
                                    <rect x="2" y="11" width="7" height="7" rx="1.5" />
                                    <rect x="11" y="11" width="7" height="7" rx="1.5" />
                                </svg>

                                <!-- book -->
                                <svg *ngSwitchCase="'book'" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M4 3h5.5a2 2 0 012 2v11a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2z"
                                        opacity="0.5" />
                                    <path d="M10.5 3H16a2 2 0 012 2v11a2 2 0 01-2 2h-5.5V3z" />
                                    <line x1="10.5" y1="3" x2="10.5" y2="18" stroke="white" stroke-width="0.5"
                                        opacity="0.4" />
                                </svg>

                                <!-- plus -->
                                <svg *ngSwitchCase="'plus'" viewBox="0 0 20 20" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round">
                                    <circle cx="10" cy="10" r="8" opacity="0.3" fill="currentColor" stroke="none" />
                                    <line x1="10" y1="6" x2="10" y2="14" />
                                    <line x1="6" y1="10" x2="14" y2="10" />
                                </svg>

                                <!-- database -->
                                <svg *ngSwitchCase="'database'" viewBox="0 0 20 20" fill="currentColor">
                                    <ellipse cx="10" cy="5" rx="7" ry="2.5" />
                                    <path d="M3 5v4c0 1.38 3.13 2.5 7 2.5S17 10.38 17 9V5" />
                                    <path d="M3 9v4c0 1.38 3.13 2.5 7 2.5S17 14.38 17 13V9" opacity="0.6" />
                                </svg>

                                <!-- settings -->
                                <svg *ngSwitchCase="'settings'" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd"
                                        d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"
                                        clip-rule="evenodd" />
                                </svg>

                            </ng-container>
                        </span>
                        <span class="ml-nav-label">{{ item.label }}</span>
                        <span class="ml-nav-indicator"></span>
                    </a>
                </li>
                }
            </ul>
        </nav>

        <!-- Profile -->
        <div class="ml-profile">
            <div class="ml-profile-avatar">P</div>
            <div class="ml-profile-info">
                <span class="ml-profile-name">Profile</span>
                <span class="ml-profile-role">Pilot</span>
            </div>
            <button class="ml-profile-chevron">
                <svg viewBox="0 0 16 16" fill="currentColor">
                    <path d="M4 6l4 4 4-4" />
                </svg>
            </button>
        </div>

    </aside>
    <!-- ── END SIDEBAR ──────────────────────────────────────── -->

    <!-- ══════════════════════════════════════════════════════
       TOPBAR (mobile only)
  ══════════════════════════════════════════════════════════ -->
    <header class="ml-topbar">
        <button class="ml-hamburger" (click)="toggleMobile()">
            <span></span><span></span><span></span>
        </button>
        <div class="ml-topbar-logo">
            <span class="ml-logo-top">AERO</span>
            <span class="ml-logo-bottom">LOGBOOK</span>
        </div>
    </header>

    <!-- ══════════════════════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════════════════════════ -->
    <main class="ml-content">
        <router-outlet />
    </main>

</div>
