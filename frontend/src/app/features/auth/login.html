<div class="auth-shell">
    <div class="auth-bg">
        <div class="auth-glow auth-glow-1"></div>
        <div class="auth-glow auth-glow-2"></div>
        <div class="auth-glow auth-glow-3"></div>
    </div>

    <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2L3 7l9 5 9-5-9-5z" opacity="0.9" />
                    <path d="M3 12l9 5 9-5" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.6" />
                </svg>
            </div>
            <div>
                <div class="auth-logo-top">AERO</div>
                <div class="auth-logo-bottom">LOGBOOK</div>
            </div>
        </div>

        <h2 class="auth-title">Willkommen zurück</h2>
        <p class="auth-sub">Melde dich an, um dein Flugbuch zu öffnen.</p>

        @if (hasError()) {
        <div class="auth-error">
            <span>⚠</span> E-Mail oder Passwort ungültig.
        </div>
        }

        <div class="auth-form">
            <div class="auth-field">
                <label class="auth-label">E-Mail</label>
                <input type="email" class="auth-input" placeholder="pilot@example.com" [(ngModel)]="email"
                    name="email" />
            </div>
            <div class="auth-field">
                <label class="auth-label">Passwort</label>
                <input type="password" class="auth-input" placeholder="••••••••" [(ngModel)]="password"
                    name="password" />
                <a class="auth-forgot" href="#">Passwort vergessen?</a>
            </div>

            <button class="auth-btn" (click)="login()" [disabled]="isLoading()">
                @if (isLoading()) {
                <span class="auth-spinner"></span> Anmelden…
                } @else {
                Anmelden
                }
            </button>
        </div>

        <p class="auth-footer">
            Noch kein Konto?
            <a routerLink="/register">Registrieren</a>
        </p>
    </div>
</div>
