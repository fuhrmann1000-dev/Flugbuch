spring:
    application:
        name: flugbuch

    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:flugbuchdb}
        username: ${SPRING_DATASOURCE_USERNAME:sa}
        password: ${SPRING_DATASOURCE_PASSWORD:password}
        driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

    h2:
        console:
            enabled: true
            path: /h2-console

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                format_sql: true
